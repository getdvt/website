<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" fill="none" role="img" aria-label="dvt — data viz tool">
  <!-- Icon mark: three ascending bars with angled tops (brand-mark teal) -->
  <!-- Bar 1: shortest, leftmost -->
  <polygon points="3,61 15,61 15,38 3,46" fill="#5BBFBA"/>
  <!-- Bar 2: middle -->
  <polygon points="19,61 33,61 33,23 19,31" fill="#5BBFBA"/>
  <!-- Bar 3: tallest, rightmost -->
  <polygon points="37,61 55,61 55,5 37,13" fill="#5BBFBA"/>
  <!-- Wordmark: "dvt" in Inter Bold, navy #16263A -->
  <!-- Gap between icon right edge (55px) and text: 16px → text at x=71 -->
  <text
    x="71"
    y="48"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="44"
    letter-spacing="-0.5"
    fill="#16263A"
  >dvt</text>
</svg>
