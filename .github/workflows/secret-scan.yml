name: Secret scan (gitleaks)

# Blocking gate: fails the PR if any secret is detected in the diff or history.
# Uses gacts/gitleaks (no license key required) with SARIF upload for the
# GitHub Advanced Security / code-scanning UI.
#
# --redact is passed internally by gacts/gitleaks (hardcoded in dist/index.js)
# so no literal secrets appear in SARIF output or logs.
#
# Required permissions:
#   contents: read         — checkout
#   security-events: write — upload-sarif

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks secret scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873 # v1.3.2
        with:
          version: 8.30.1
          fail-on-error: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3.36.2
        with:
          sarif_file: ${{ steps.gitleaks.outputs.sarif }}
