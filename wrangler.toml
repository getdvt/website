# Cloudflare Pages / Workers config for dvt.dev
# Pages Functions (functions/) deploy automatically with the site.
# Local dev: `wrangler pages dev dist/` after `npm run build`

name = "dvt-website"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 database binding for handraise capture
# Create the DB first: wrangler d1 create dvt-handraises
# Then run the schema: wrangler d1 execute dvt-handraises --file=schema.sql
[[d1_databases]]
binding = "DB"
database_name = "dvt-handraises"
database_id = "37155907-6089-4112-ba22-3ebba2db3549"

# Environment variables (non-secret)
# Secrets (RESEND_API_KEY, TURNSTILE_SECRET_KEY, SANDBOX_INTERNAL_KEY) go in
# Pages → Settings → Environment variables. SANDBOX_INTERNAL_KEY in particular
# MUST be set as a secret (never committed here) — it is the Bearer key that
# authorizes /internal/sandbox/provision on the dvt API.
[vars]
NOTIFY_EMAIL          = "collin@dvt.dev"
DVT_API_BASE          = "https://dvt-api.fly.dev"
DEMO_TTL_HOURS        = "72"
DEMO_IP_CAP_24H       = "3"
DEMO_GLOBAL_CAP_24H   = "50"
